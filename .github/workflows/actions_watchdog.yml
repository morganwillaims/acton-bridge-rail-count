name: Acton Bridge Actions Watchdog

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC and may be delayed a few minutes.
    # This checks every 10 minutes, but only dispatches stale jobs.
    

permissions:
  actions: write
  contents: read

concurrency:
  group: acton-bridge-actions-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check and restart stale Acton Bridge workflows
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # workflow_file.yml:freshness_minutes
          # Freshness windows are deliberately wider because your collectors can run 15–40 minutes.
          WATCHED_WORKFLOWS: |
            collector.yml:75
            td_collector.yml:45
            route_backfill_loop.yml:120
            vstp_collector.yml:90
            schedule_loader.yml:720
            pathing_power_injector.yml:180
        run: |
          set -u
          echo "Acton Bridge watchdog started at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Repository: $REPO"
          echo

          now_epoch=$(date -u +%s)

          while IFS=: read -r workflow_file freshness_minutes; do
            workflow_file="$(echo "$workflow_file" | xargs)"
            freshness_minutes="$(echo "$freshness_minutes" | xargs)"
            [ -z "$workflow_file" ] && continue

            echo "============================================================"
            echo "Checking $workflow_file (freshness ${freshness_minutes} min)"

            # Confirm the workflow exists. If not, skip cleanly.
            if ! gh api "repos/$REPO/actions/workflows/$workflow_file" >/tmp/workflow.json 2>/tmp/workflow_err.txt; then
              echo "SKIP: $workflow_file not found or not accessible."
              cat /tmp/workflow_err.txt || true
              continue
            fi

            state=$(jq -r '.state // "unknown"' /tmp/workflow.json)
            echo "Workflow state: $state"
            if [ "$state" != "active" ]; then
              echo "SKIP: $workflow_file is not active. Enable it in GitHub Actions first."
              continue
            fi

            # If there is already an active run, do not dispatch another.
            active_count=$(gh api "repos/$REPO/actions/workflows/$workflow_file/runs?per_page=10" \
              --jq '[.workflow_runs[] | select(.status=="queued" or .status=="in_progress" or .status=="waiting" or .status=="pending" or .status=="requested")] | length' 2>/dev/null || echo 0)

            if [ "${active_count:-0}" -gt 0 ]; then
              echo "OK: $workflow_file already has $active_count active run(s). Not dispatching."
              continue
            fi

            last_json=$(gh api "repos/$REPO/actions/workflows/$workflow_file/runs?per_page=1" 2>/dev/null || echo '{}')
            last_created=$(echo "$last_json" | jq -r '.workflow_runs[0].created_at // empty')
            last_status=$(echo "$last_json" | jq -r '.workflow_runs[0].status // empty')
            last_conclusion=$(echo "$last_json" | jq -r '.workflow_runs[0].conclusion // empty')
            last_event=$(echo "$last_json" | jq -r '.workflow_runs[0].event // empty')

            if [ -z "$last_created" ]; then
              echo "No previous run found. Dispatching $workflow_file."
              gh workflow run "$workflow_file" --repo "$REPO" --ref "${GITHUB_REF_NAME:-main}"
              continue
            fi

            last_epoch=$(date -u -d "$last_created" +%s)
            age_min=$(( (now_epoch - last_epoch) / 60 ))
            echo "Last run: $last_created UTC, age ${age_min} min, status=$last_status, conclusion=$last_conclusion, event=$last_event"

            should_dispatch=0
            reason=""

            if [ "$age_min" -gt "$freshness_minutes" ]; then
              should_dispatch=1
              reason="stale: age ${age_min} min > ${freshness_minutes} min"
            fi

            if [ "$last_conclusion" = "failure" ] || [ "$last_conclusion" = "timed_out" ] || [ "$last_conclusion" = "cancelled" ] || [ "$last_conclusion" = "startup_failure" ]; then
              should_dispatch=1
              reason="last conclusion was $last_conclusion"
            fi

            if [ "$should_dispatch" -eq 1 ]; then
              echo "DISPATCH: $workflow_file because $reason"
              gh workflow run "$workflow_file" --repo "$REPO" --ref "${GITHUB_REF_NAME:-main}"
            else
              echo "OK: $workflow_file is fresh enough."
            fi
          done <<< "$WATCHED_WORKFLOWS"

          echo
          echo "Watchdog finished at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
