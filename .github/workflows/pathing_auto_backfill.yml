name: Pathing Auto Backfill v1

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date to backfill, YYYY-MM-DD. Leave blank for today."
        required: false
        default: ""
      dry_run:
        description: "Dry run only?"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      enable_safe_freight_fallback:
        description: "Use cautious likely-diesel fallback for visible freight rows only?"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      rebuild_public_snapshot_after:
        description: "Run scripts/build-public-snapshot.js after successful backfill?"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

  schedule:
    # Keep current-day freight pathing fresh.
    # GitHub schedules are UTC and may run a few minutes late.
    - cron: "*/30 * * * *"

jobs:
  pathing-auto-backfill:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TARGET_DATE: ${{ github.event.inputs.target_date }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      ENABLE_SAFE_FREIGHT_FALLBACK: ${{ github.event.inputs.enable_safe_freight_fallback || 'true' }}
      SNAPSHOT_DATE: ${{ github.event.inputs.target_date }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check Pathing Auto Backfill
        run: python -m py_compile scripts/pathing_auto_backfill.py

      - name: Run Pathing Auto Backfill v1.3
        run: python scripts/pathing_auto_backfill.py

      - name: Rebuild public snapshot after backfill
        if: ${{ github.event.inputs.rebuild_public_snapshot_after == 'true' }}
        env:
          SNAPSHOT_DATE: ${{ github.event.inputs.target_date }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -f scripts/build-public-snapshot.js ]; then
            echo "Running public snapshot builder after pathing backfill..."
            node scripts/build-public-snapshot.js
          else
            echo "scripts/build-public-snapshot.js not found; skipping snapshot rebuild."
          fi
