name: Acton Bridge Pathing Power Injector

on:
  workflow_dispatch:
    inputs:
      date:
        description: Optional date YYYY-MM-DD
        required: false
        type: string
  schedule:
    # Staggered away from the main collector/backfill loops.
    - cron: '7 * * * *'

concurrency:
  group: acton-bridge-pathing-power-injector
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  inject-pathing-power:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject pathing power fields
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACTON_DATE: ${{ inputs.date }}
        run: node scripts/inject-pathing-power.js
