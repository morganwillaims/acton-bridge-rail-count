name: Acton Bridge Pathing Power Injector v2

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Optional date YYYY-MM-DD'
        required: false
        type: string
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: read

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  TARGET_DATE: ${{ inputs.target_date }}

jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Inject pathing power
        run: node scripts/inject-pathing-power-v2.js
