name: Acton Bridge Pathing Power Injector v4

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: 'Date to inject, YYYY-MM-DD. Leave blank for UK today.'
        required: false
        default: ''
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: read

jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Inject pathing power
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STATION_CRS: ACB
          TARGET_DATE: ${{ github.event.inputs.snapshot_date }}
        run: node scripts/inject-pathing-power-v4.js
