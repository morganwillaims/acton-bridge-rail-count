name: Acton Bridge Pathing Power Injector v5

on:
  workflow_dispatch:
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: read

concurrency:
  group: acton-bridge-pathing-power-injector-v5
  cancel-in-progress: true

jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Inject pathing power from schedule/VSTP source fields
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STATION_CRS: ACB
        run: node scripts/inject-pathing-power-v5.js
