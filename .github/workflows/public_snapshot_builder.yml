name: Acton Bridge Public Snapshot Builder

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: "Snapshot date to build, e.g. 2026-05-16. Leave blank for today."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and save public snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STATION_CRS: ACB
          SNAPSHOT_DATE: ${{ github.event.inputs.snapshot_date }}
        run: node scripts/build-public-snapshot.js
