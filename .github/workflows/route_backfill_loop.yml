name: Acton Bridge Route Backfill Loop

on:
  schedule:
    # Starts a 55-minute loop every hour.
    # The script itself waits 60 seconds between passes.
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: acton-bridge-route-backfill-loop
  cancel-in-progress: false

jobs:
  backfill-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run route backfill loop
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ROUTE_BACKFILL_LOOP_SECONDS: "3300"
          ROUTE_BACKFILL_SLEEP_SECONDS: "60"
        run: python route_backfill_loop.py
