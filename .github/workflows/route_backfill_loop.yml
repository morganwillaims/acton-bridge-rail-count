name: Acton Bridge Route Backfill Loop

on:
  workflow_dispatch:
  schedule:
    # Backfill routes after data has arrived. Staggered to avoid the collectors.
    - cron: "12-59/30 * * * *"

concurrency:
  group: acton-bridge-route-backfill
  cancel-in-progress: true

jobs:
  route_backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run route backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -f route_backfill_loop.py ]; then
            python route_backfill_loop.py
          elif [ -f route_backfill.py ]; then
            python route_backfill.py
          else
            echo "No route backfill script found"
            exit 1
          fi
