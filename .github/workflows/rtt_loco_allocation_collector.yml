name: Acton Bridge RTT Loco Allocation Collector

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"

concurrency:
  group: acton-bridge-rtt-loco-allocations
  cancel-in-progress: false

jobs:
  rtt-loco-allocations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run RTT loco allocation collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # RTT Next Generation API token
          RTT_BEARER_TOKEN: ${{ secrets.RTT_BEARER_TOKEN }}
          RTT_API_BASE: https://data.rtt.io
          RTT_STATION: ACBG

          # Optional debug. Set to 1 temporarily if we need to inspect API JSON shapes.
          RTT_DEBUG_WRITE_JSON: "0"
        run: python rtt_loco_allocation_collector.py
