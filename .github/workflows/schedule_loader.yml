name: Acton Bridge Schedule Loader

on:
  workflow_dispatch:
  schedule:
    # Schedule data is heavier. Run automatically but not constantly.
    - cron: "18 03 * * *"
    - cron: "18 15 * * *"

concurrency:
  group: acton-bridge-schedule-loader
  cancel-in-progress: true

jobs:
  load_schedules:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run schedule loader once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NETWORK_RAIL_USERNAME: ${{ secrets.NETWORK_RAIL_USERNAME }}
          NETWORK_RAIL_PASSWORD: ${{ secrets.NETWORK_RAIL_PASSWORD }}
          NR_USERNAME: ${{ secrets.NR_USERNAME }}
          NR_PASSWORD: ${{ secrets.NR_PASSWORD }}
        run: |
          if [ -f schedule_loader.py ]; then
            python schedule_loader.py
          elif [ -f load_schedules.py ]; then
            python load_schedules.py
          else
            echo "No schedule loader script found"
            exit 1
          fi
