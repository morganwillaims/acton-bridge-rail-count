name: Acton Bridge TD Collector

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: acton-bridge-td-collector
  cancel-in-progress: true

jobs:
  td:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install stomp.py requests
      - name: Test Network Rail STOMP connection
        env:
          NETWORK_RAIL_USERNAME: ${{ secrets.NETWORK_RAIL_USERNAME }}
          NETWORK_RAIL_PASSWORD: ${{ secrets.NETWORK_RAIL_PASSWORD }}
        run: |
          python - <<'PY'
          import os, socket

          host = "publicdatafeeds.networkrail.co.uk"
          port = 61618

          print("Username secret present:", bool(os.environ.get("NETWORK_RAIL_USERNAME")))
          print("Password secret present:", bool(os.environ.get("NETWORK_RAIL_PASSWORD")))

          try:
              print(f"Testing TCP connection to {host}:{port}...")
              s = socket.create_connection((host, port), timeout=20)
              print("TCP connection OK")
              s.close()
          except Exception as e:
              print("TCP connection FAILED:", repr(e))
              raise
          PY
      - name: Run TD collector
        env:
          NETWORK_RAIL_USERNAME: ${{ secrets.NETWORK_RAIL_USERNAME }}
          NETWORK_RAIL_PASSWORD: ${{ secrets.NETWORK_RAIL_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TD_AREA_FILTER: "CE"
          LISTEN_SECONDS: "240"
          STORE_TD_EVENTS: "false"
        run: python td_collector.py
