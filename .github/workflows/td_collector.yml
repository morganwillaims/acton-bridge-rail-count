name: TD Collector

on:
  workflow_dispatch:
  schedule:
    # TD collector: offset from TRUST collector to avoid runner pile-ups.
    - cron: "2-59/5 * * * *"

concurrency:
  group: acton-bridge-td-collector
  cancel-in-progress: true

jobs:
  collect_td:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run TD collector once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NETWORK_RAIL_USERNAME: ${{ secrets.NETWORK_RAIL_USERNAME }}
          NETWORK_RAIL_PASSWORD: ${{ secrets.NETWORK_RAIL_PASSWORD }}
          NR_USERNAME: ${{ secrets.NR_USERNAME }}
          NR_PASSWORD: ${{ secrets.NR_PASSWORD }}
        run: |
          python td_collector.py
