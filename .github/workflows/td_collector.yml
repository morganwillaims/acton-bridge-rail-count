name: TD Collector

on:
  workflow_dispatch:
  schedule:
    - cron: "*/55 * * * *"

concurrency:
  group: td-collector
  cancel-in-progress: true

jobs:
  collect-td:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run TD collector loop
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NETWORK_RAIL_USERNAME: ${{ secrets.NETWORK_RAIL_USERNAME }}
          NETWORK_RAIL_PASSWORD: ${{ secrets.NETWORK_RAIL_PASSWORD }}
        run: |
          echo "Starting TD collector loop..."

          for i in {1..10}
          do
            echo "TD collector run $i of 10 at $(date -u)"

            node td-collector.js || echo "TD collector run $i failed but loop will continue"

            if [ "$i" -lt 10 ]; then
              echo "Waiting 5 minutes before next TD collection..."
              sleep 300
            fi
          done

          echo "TD collector loop finished."
