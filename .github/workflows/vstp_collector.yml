name: Acton Bridge VSTP Collector

on:
  workflow_dispatch:
  schedule:
    # VSTP fills special/short-term route gaps. Offset from TRUST/TD collectors.
    - cron: "7-59/15 * * * *"

concurrency:
  group: acton-bridge-vstp-collector
  cancel-in-progress: true

jobs:
  collect_vstp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run VSTP collector once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NETWORK_RAIL_USERNAME: ${{ secrets.NETWORK_RAIL_USERNAME }}
          NETWORK_RAIL_PASSWORD: ${{ secrets.NETWORK_RAIL_PASSWORD }}
          NR_USERNAME: ${{ secrets.NR_USERNAME }}
          NR_PASSWORD: ${{ secrets.NR_PASSWORD }}
        run: |
          if [ -f vstp_collector.py ]; then
            python vstp_collector.py
          elif [ -f collect_vstp.py ]; then
            python collect_vstp.py
          else
            echo "No VSTP collector script found"
            exit 1
          fi
